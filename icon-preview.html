<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>onueldev 아이콘 미리보기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020617; font-family: system-ui, sans-serif; color: #f8fafc; padding: 40px 24px; }
    h1 { color: #BAE6FD; font-size: 20px; margin-bottom: 36px; letter-spacing: 0.05em; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px; max-width: 720px; }
    .card { background: #0f172a; border: 1px solid rgba(99,102,241,0.25); border-radius: 16px; padding: 32px; }
    .card-title { color: #6366F1; font-size: 13px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
    .card-desc  { color: #94a3b8; font-size: 12px; margin-bottom: 28px; line-height: 1.5; }
    .icons { display: flex; align-items: flex-end; gap: 24px; }
    .icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .label { color: #64748b; font-size: 11px; }
  </style>
</head>
<body>
  <h1>onueldev — 아이콘 옵션 비교</h1>
  <div class="grid">

    <!-- 1. 혜성 단독 -->
    <div class="card">
      <div class="card-title">1. 혜성 단독</div>
      <div class="card-desc">네비게이션 혜성과 동일 — 브랜드 일관성</div>
      <div class="icons">
        <div class="icon-wrap">
          <svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <g transform="rotate(-30 48 48)">
            <circle cx="76" cy="42" r="14" fill="#BAE6FD" fill-opacity="0.15"/>
            <circle cx="76" cy="42" r="9" fill="url(#g1)"/>
            <circle cx="57" cy="30" r="6.5" fill="#6366F1" fill-opacity="0.70"/>
            <circle cx="38" cy="36" r="4.5" fill="#6366F1" fill-opacity="0.42"/>
            <circle cx="22" cy="48" r="3"   fill="#6366F1" fill-opacity="0.22"/>
            </g>
            <defs>
              <radialGradient id="g1" cx="40%" cy="40%" r="60%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#BAE6FD"/>
              </radialGradient>
            </defs>
          </svg>
          <span class="label">96px</span>
        </div>
        <div class="icon-wrap">
          <svg width="48" height="48" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <g transform="rotate(-30 48 48)">
            <circle cx="76" cy="42" r="14" fill="#BAE6FD" fill-opacity="0.15"/>
            <circle cx="76" cy="42" r="9"  fill="#BAE6FD"/>
            <circle cx="57" cy="30" r="6.5" fill="#6366F1" fill-opacity="0.70"/>
            <circle cx="38" cy="36" r="4.5" fill="#6366F1" fill-opacity="0.42"/>
            <circle cx="22" cy="48" r="3"   fill="#6366F1" fill-opacity="0.22"/>
            </g>
          </svg>
          <span class="label">48px</span>
        </div>
        <div class="icon-wrap">
          <svg width="32" height="32" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <g transform="rotate(-30 48 48)">
            <circle cx="76" cy="42" r="14" fill="#BAE6FD" fill-opacity="0.15"/>
            <circle cx="76" cy="42" r="9"  fill="#BAE6FD"/>
            <circle cx="57" cy="30" r="6.5" fill="#6366F1" fill-opacity="0.70"/>
            <circle cx="38" cy="36" r="4.5" fill="#6366F1" fill-opacity="0.42"/>
            <circle cx="22" cy="48" r="3"   fill="#6366F1" fill-opacity="0.22"/>
            </g>
          </svg>
          <span class="label">32px</span>
        </div>
        <div class="icon-wrap">
          <svg width="16" height="16" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <g transform="rotate(-30 48 48)">
            <circle cx="76" cy="42" r="14" fill="#BAE6FD" fill-opacity="0.15"/>
            <circle cx="76" cy="42" r="9"  fill="#BAE6FD"/>
            <circle cx="57" cy="30" r="6.5" fill="#6366F1" fill-opacity="0.70"/>
            <circle cx="38" cy="36" r="4.5" fill="#6366F1" fill-opacity="0.42"/>
            <circle cx="22" cy="48" r="3"   fill="#6366F1" fill-opacity="0.22"/>
            </g>
          </svg>
          <span class="label">16px</span>
        </div>
      </div>
    </div>

    <!-- 2. od 레터마크 -->
    <div class="card">
      <div class="card-title">2. od 레터마크</div>
      <div class="card-desc">"onueldev" 이니셜 — o 안에 혜성 꼬리</div>
      <div class="icons">
        <div class="icon-wrap">
          <svg width="96" height="96" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <!-- o -->
            <text x="10" y="68" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#BAE6FD">o</text>
            <!-- comet tail inside o -->
            <circle cx="33" cy="42" r="4.5" fill="#ffffff" fill-opacity="0.9"/>
            <circle cx="26" cy="50" r="3"   fill="#6366F1" fill-opacity="0.7"/>
            <circle cx="20" cy="57" r="1.8" fill="#6366F1" fill-opacity="0.4"/>
            <!-- d -->
            <text x="50" y="68" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#6366F1">d</text>
          </svg>
          <span class="label">96px</span>
        </div>
        <div class="icon-wrap">
          <svg width="48" height="48" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <text x="10" y="68" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#BAE6FD">o</text>
            <circle cx="33" cy="42" r="4.5" fill="#ffffff" fill-opacity="0.9"/>
            <circle cx="26" cy="50" r="3"   fill="#6366F1" fill-opacity="0.7"/>
            <circle cx="20" cy="57" r="1.8" fill="#6366F1" fill-opacity="0.4"/>
            <text x="50" y="68" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#6366F1">d</text>
          </svg>
          <span class="label">48px</span>
        </div>
        <div class="icon-wrap">
          <svg width="32" height="32" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <text x="10" y="68" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#BAE6FD">o</text>
            <circle cx="33" cy="42" r="4.5" fill="#ffffff" fill-opacity="0.9"/>
            <circle cx="26" cy="50" r="3"   fill="#6366F1" fill-opacity="0.7"/>
            <text x="50" y="68" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#6366F1">d</text>
          </svg>
          <span class="label">32px</span>
        </div>
        <div class="icon-wrap">
          <svg width="16" height="16" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <text x="10" y="68" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#BAE6FD">o</text>
            <circle cx="33" cy="42" r="4.5" fill="#ffffff"/>
            <text x="50" y="68" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#6366F1">d</text>
          </svg>
          <span class="label">16px</span>
        </div>
      </div>
    </div>

    <!-- 3. 별 + 코드 -->
    <div class="card">
      <div class="card-title">3. 별 + 코드</div>
      <div class="card-desc">별 안에 &lt;/&gt; — 개발 + 우주 직관적 표현</div>
      <div class="icons">
        <div class="icon-wrap">
          <svg width="96" height="96" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <!-- star shape -->
            <polygon points="48,10 55,35 82,35 60,52 68,77 48,61 28,77 36,52 14,35 41,35"
              fill="none" stroke="url(#g3)" stroke-width="2.5" stroke-linejoin="round"/>
            <!-- </> inside -->
            <text x="48" y="54" font-family="monospace" font-size="16" font-weight="700"
              fill="#6366F1" text-anchor="middle" letter-spacing="-1">&lt;/&gt;</text>
            <defs>
              <linearGradient id="g3" x1="14" y1="10" x2="82" y2="77" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#BAE6FD"/>
                <stop offset="100%" stop-color="#6366F1"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="label">96px</span>
        </div>
        <div class="icon-wrap">
          <svg width="48" height="48" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <polygon points="48,10 55,35 82,35 60,52 68,77 48,61 28,77 36,52 14,35 41,35"
              fill="none" stroke="#BAE6FD" stroke-width="2.5" stroke-linejoin="round"/>
            <text x="48" y="54" font-family="monospace" font-size="16" font-weight="700"
              fill="#6366F1" text-anchor="middle" letter-spacing="-1">&lt;/&gt;</text>
          </svg>
          <span class="label">48px</span>
        </div>
        <div class="icon-wrap">
          <svg width="32" height="32" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <polygon points="48,10 55,35 82,35 60,52 68,77 48,61 28,77 36,52 14,35 41,35"
              fill="none" stroke="#BAE6FD" stroke-width="2.5" stroke-linejoin="round"/>
            <text x="48" y="54" font-family="monospace" font-size="16" font-weight="700"
              fill="#6366F1" text-anchor="middle" letter-spacing="-1">&lt;/&gt;</text>
          </svg>
          <span class="label">32px</span>
        </div>
        <div class="icon-wrap">
          <svg width="16" height="16" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <polygon points="48,10 55,35 82,35 60,52 68,77 48,61 28,77 36,52 14,35 41,35"
              fill="#6366F1" fill-opacity="0.3" stroke="#BAE6FD" stroke-width="3" stroke-linejoin="round"/>
          </svg>
          <span class="label">16px</span>
        </div>
      </div>
    </div>

    <!-- 4. 혜성 + o -->
    <div class="card">
      <div class="card-title">4. 혜성 + o</div>
      <div class="card-desc">'o'가 혜성 머리 — 브랜드명과 직결</div>
      <div class="icons">
        <div class="icon-wrap">
          <svg width="96" height="96" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <!-- glow behind o -->
            <circle cx="60" cy="36" r="20" fill="#BAE6FD" fill-opacity="0.10"/>
            <!-- tail dots -->
            <circle cx="24" cy="74" r="4"   fill="#6366F1" fill-opacity="0.30"/>
            <circle cx="34" cy="64" r="5.5" fill="#6366F1" fill-opacity="0.48"/>
            <circle cx="46" cy="52" r="7"   fill="#6366F1" fill-opacity="0.65"/>
            <!-- 'o' as comet head -->
            <circle cx="60" cy="36" r="16" fill="none" stroke="url(#g4)" stroke-width="5"/>
            <!-- inner bright core -->
            <circle cx="60" cy="36" r="5" fill="#ffffff" fill-opacity="0.85"/>
            <defs>
              <linearGradient id="g4" x1="44" y1="20" x2="76" y2="52" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#BAE6FD"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="label">96px</span>
        </div>
        <div class="icon-wrap">
          <svg width="48" height="48" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <circle cx="60" cy="36" r="20" fill="#BAE6FD" fill-opacity="0.10"/>
            <circle cx="24" cy="74" r="4"   fill="#6366F1" fill-opacity="0.30"/>
            <circle cx="34" cy="64" r="5.5" fill="#6366F1" fill-opacity="0.48"/>
            <circle cx="46" cy="52" r="7"   fill="#6366F1" fill-opacity="0.65"/>
            <circle cx="60" cy="36" r="16" fill="none" stroke="#BAE6FD" stroke-width="5"/>
            <circle cx="60" cy="36" r="5" fill="#ffffff" fill-opacity="0.85"/>
          </svg>
          <span class="label">48px</span>
        </div>
        <div class="icon-wrap">
          <svg width="32" height="32" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <circle cx="24" cy="74" r="4"   fill="#6366F1" fill-opacity="0.30"/>
            <circle cx="34" cy="64" r="5.5" fill="#6366F1" fill-opacity="0.48"/>
            <circle cx="46" cy="52" r="7"   fill="#6366F1" fill-opacity="0.65"/>
            <circle cx="60" cy="36" r="16" fill="none" stroke="#BAE6FD" stroke-width="5"/>
            <circle cx="60" cy="36" r="5" fill="#ffffff" fill-opacity="0.85"/>
          </svg>
          <span class="label">32px</span>
        </div>
        <div class="icon-wrap">
          <svg width="16" height="16" viewBox="0 0 96 96" fill="none">
            <rect width="96" height="96" rx="22" fill="#0f172a"/>
            <circle cx="34" cy="64" r="5.5" fill="#6366F1" fill-opacity="0.5"/>
            <circle cx="46" cy="52" r="7"   fill="#6366F1" fill-opacity="0.7"/>
            <circle cx="60" cy="36" r="16" fill="none" stroke="#BAE6FD" stroke-width="6"/>
            <circle cx="60" cy="36" r="5" fill="#ffffff"/>
          </svg>
          <span class="label">16px</span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
