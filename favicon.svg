<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="head-dark" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </radialGradient>
    <radialGradient id="head-light" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </radialGradient>
  </defs>

  <!-- 다크 모드 -->
  <style>
    @media (prefers-color-scheme: dark) {
      .bg  { fill: #0f172a; }
      .h1  { fill: url(#head-dark); }
      .d1  { fill: #6366F1; fill-opacity: 0.70; }
      .d2  { fill: #6366F1; fill-opacity: 0.42; }
      .d3  { fill: #6366F1; fill-opacity: 0.22; }
      .glow{ fill: #BAE6FD; fill-opacity: 0.15; }
    }
    @media (prefers-color-scheme: light) {
      .bg  { fill: #F0F9FF; }
      .h1  { fill: url(#head-light); }
      .d1  { fill: #6366F1; fill-opacity: 0.75; }
      .d2  { fill: #6366F1; fill-opacity: 0.48; }
      .d3  { fill: #6366F1; fill-opacity: 0.28; }
      .glow{ fill: #0284C7; fill-opacity: 0.18; }
    }
  </style>

  <rect class="bg" width="96" height="96" rx="22"/>
  <g transform="rotate(-30 48 48)">
    <circle class="glow" cx="76" cy="42" r="14"/>
    <circle class="h1"   cx="76" cy="42" r="9"/>
    <circle class="d1"   cx="57" cy="30" r="6.5"/>
    <circle class="d2"   cx="38" cy="36" r="4.5"/>
    <circle class="d3"   cx="22" cy="48" r="3"/>
  </g>
</svg>
